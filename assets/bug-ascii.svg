<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 176" role="img" aria-label="ASCII bug running left to right">
  <title>Bug ASCII art</title>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0d1117" rx="8"/>
  <!-- monospace ~6.95px per char at 11.5px -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="-340 8; 480 8" keyTimes="0;1" dur="11.5s" repeatCount="indefinite" calcMode="linear"/>
    <g filter="url(#glow)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -5; 0 -1; 0 -5; 0 0" keyTimes="0;0.22;0.5;0.72;1" dur="0.36s" repeatCount="indefinite" calcMode="linear"/>
        <g>
          <animateTransform attributeName="transform" type="rotate"
            values="-4 136 150; 5 136 150; -4 136 150" keyTimes="0;0.5;1" dur="0.36s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
          <text font-family="ui-monospace, Consolas, 'Cascadia Mono', monospace" font-size="11.5" fill="#7ee787" xml:space="preserve">
            <tspan x="16" y="22">                    /</tspan>
            <tspan x="16" dy="14">               ,.. /</tspan>
            <tspan x="16" dy="14">             ,'   ';</tspan>
            <tspan x="16" dy="14">  ,,.__    _,' /';  .</tspan>
            <tspan x="16" dy="14"> :','  ~~~~    '. '~</tspan>
            <tspan x="16" dy="14">:' (NO!)   bug    )::,</tspan>
            <tspan x="16" dy="14">'. '. .=----=..-~  .;'</tspan>
            <tspan x="16" dy="14"> '  ;'  ::   ':.  '"</tspan>
            <tspan x="16" dy="14">   (:   ':    ;)</tspan>
            <tspan x="16" dy="14">    \\   '"  ./</tspan>
            <tspan x="16" dy="14">     '"      '"</tspan>
          </text>
        </g>
      </g>
    </g>
  </g>
</svg>
