<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 168" role="img" aria-label="Animated ASCII bug">
  <title>Bug ASCII art</title>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0d1117" rx="8"/>
  <g filter="url(#glow)">
    <g>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0 0; 0 -2.5; 0 0" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1" keyTimes="0;0.5;1"/>
      <text font-family="ui-monospace, Consolas, 'Cascadia Mono', monospace" font-size="11.5" fill="#7ee787" xml:space="preserve">
        <tspan x="16" y="22">                    /</tspan>
        <tspan x="16" dy="14">               ,.. /</tspan>
        <tspan x="16" dy="14">             ,'   ';</tspan>
        <tspan x="16" dy="14">  ,,.__    _,' /';  .</tspan>
        <tspan x="16" dy="14"> :','  ~~~~    '. '~</tspan>
        <tspan x="16" dy="14">:' (NO!)   bug    )::,</tspan>
        <tspan x="16" dy="14">'. '. .=----=..-~  .;'</tspan>
        <tspan x="16" dy="14"> '  ;'  ::   ':.  '"</tspan>
        <tspan x="16" dy="14">   (:   ':    ;)</tspan>
        <tspan x="16" dy="14">    \\   '"  ./</tspan>
        <tspan x="16" dy="14">     '"      '"</tspan>
      </text>
    </g>
    <rect x="8" y="10" width="424" height="3" fill="#58a6ff" opacity="0.12">
      <animate attributeName="y" values="10;155;10" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.18;0.06" dur="5s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- ? 6 ?????????????????? -->
  <g>
    <animateTransform attributeName="transform" type="translate" additive="sum"
      values="0 0; 0 -2.5; 0 0" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    <text font-family="ui-monospace, Consolas, 'Cascadia Mono', monospace" font-size="11.5" x="16" y="92" xml:space="preserve">
      <animate attributeName="fill" values="#ff7b72;#ffa657;#79c0ff;#7ee787;#ff7b72" dur="4s" repeatCount="indefinite"/>
      :' (NO!)   bug    )::,
    </text>
  </g>
</svg>
